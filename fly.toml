# fly.toml - configuracao do app no Fly.io
# Antes do primeiro deploy: fly secrets set DATABASE_URL="..." GOLDRUSH_API_KEY="..."
# Opcional: fly postgres create e fly postgres attach <nome> para banco no Fly

app = "crypto-api"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "npx prisma migrate deploy"
